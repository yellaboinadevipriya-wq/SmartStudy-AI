<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStudy AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="darkModeBtn">🌙 Dark Mode</button>

    <h1>📚 SmartStudy AI</h1>

    <!-- Add Task -->
    <input type="text" id="taskInput" placeholder="Enter a task">

    <input type="date" id="deadlineInput">

    <select id="category">
        <option>Assignment</option>
        <option>Exam</option>
        <option>Project</option>
        <option>Revision</option>
    </select>

    <select id="priority">
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
    </select>

    <button id="addTaskBtn">Add Task</button>

    <br><br>

    <!-- Search -->
    <input
        type="text"
        id="searchTask"
        placeholder="🔍 Search Tasks">

    <!-- Dashboard -->
    <h2>Dashboard</h2>

    <div class="dashboard">

        <div class="card">
            <h3>Total Tasks</h3>
            <p id="totalTasks">0</p>
        </div>

        <div class="card">
            <h3>Completed</h3>
            <p id="completedTasks">0</p>
        </div>

        <div class="card">
            <h3>Progress</h3>
            <p><span id="progress">0%</span></p>
        </div>

    </div>

    <!-- Task List -->
    <h2>Your Tasks</h2>

    <ul id="taskList"></ul>

    <br>

    <!-- Export -->
    <button id="exportBtn">📄 Export Tasks</button>

    <hr>

    <!-- Motivation -->
    <h2>Daily Motivation</h2>

    <button id="quoteBtn">
        Get Motivation
    </button>

    <p id="quoteText"></p>

    <hr>

    <!-- Study Plan -->
    <h2>Study Plan Generator</h2>

    <input
        type="text"
        id="subject"
        placeholder="Enter Subject">

    <input
        type="number"
        id="days"
        placeholder="Days">

    <button id="planBtn">
        Generate Plan
    </button>

    <div id="studyPlan"></div>

    <script src="script.js"></script>

</body>
</html>
